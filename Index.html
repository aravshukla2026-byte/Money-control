  function createIcons(){
    document.querySelectorAll('[data-lucide]').forEach(function(el){
      const name = el.getAttribute('data-lucide');
      const inner = ICONS[name];
      if(inner === undefined) return;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('width', '24');
      svg.setAttribute('height', '24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.innerHTML = inner;
      for(const attr of Array.from(el.attributes)){
        if(attr.name !== 'data-lucide') svg.setAttribute(attr.name, attr.value);
      }
      svg.classList.add('lucide-icon');
      el.replaceWith(svg);
    });
  }
  return { createIcons };
})();

<style>
/* ============================= DESIGN TOKENS ============================= */
:root{
  --bg:#0B0A16; --bg-elev:#15121F; --bg-elev-2:#1D1830;
  --glass:rgba(212,175,55,0.045); --glass-strong:rgba(212,175,55,0.09); --glass-border:rgba(212,175,55,0.18);
  --text:#F0E6C8; --text-dim:#B9A77C; --text-faint:#71633F;
  --emerald:#2E8B57; --emerald-soft:rgba(46,139,87,0.18);
  --coral:#B31B34; --coral-soft:rgba(179,27,52,0.18);
  --gold:#D4AF37; --gold-soft:rgba(212,175,55,0.18);
  --violet:#6B3FA0; --violet-soft:rgba(107,63,160,0.18);
  --ring-shadow:0 20px 60px -20px rgba(0,0,0,0.7);
  --radius:18px;
}
html.light{
  --bg:#F1E6C8; --bg-elev:#FBF3DE; --bg-elev-2:#F6EAC8;
  --glass:rgba(255,255,255,0.55); --glass-strong:rgba(255,255,255,0.8); --glass-border:rgba(107,47,20,0.16);
  --text:#3B2412; --text-dim:#6B4A2A; --text-faint:#9C7B4F;
  --emerald:#1F6B3B; --emerald-soft:rgba(31,107,59,0.12);
  --coral:#8C1327; --coral-soft:rgba(140,19,39,0.12);
  --gold:#96690A; --gold-soft:rgba(150,105,10,0.14);
  --violet:#4A2170; --violet-soft:rgba(74,33,112,0.12);
  --ring-shadow:0 20px 50px -25px rgba(59,36,18,0.3);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; color:var(--text);
  font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  transition:background .35s ease, color .35s ease;
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 15% 10%, rgba(212,175,55,0.07), transparent 38%),
    radial-gradient(circle at 85% 0%, rgba(107,63,160,0.10), transparent 42%),
    radial-gradient(circle at 50% 100%, rgba(46,139,87,0.06), transparent 40%),
    radial-gradient(1.5px 1.5px at 10% 20%, rgba(240,230,200,0.55) 100%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 15%, rgba(240,230,200,0.45) 100%, transparent 100%),
    radial-gradient(1px 1px at 60% 70%, rgba(240,230,200,0.4) 100%, transparent 100%),
    radial-gradient(1.5px 1.5px at 25% 85%, rgba(240,230,200,0.4) 100%, transparent 100%),
    radial-gradient(1px 1px at 92% 60%, rgba(240,230,200,0.35) 100%, transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 35%, rgba(240,230,200,0.3) 100%, transparent 100%);
  background-attachment:fixed;
  background-size:100% 100%;
}
html.light body{
  background-image:
    radial-gradient(circle at 15% 10%, rgba(150,105,10,0.09), transparent 38%),
    radial-gradient(circle at 85% 0%, rgba(74,33,112,0.08), transparent 42%),
    radial-gradient(circle at 50% 100%, rgba(31,107,59,0.06), transparent 40%),
    radial-gradient(circle at 50% 50%, transparent 55%, rgba(107,47,20,0.07) 100%),
    radial-gradient(1.5px 1.5px at 12% 22%, rgba(150,105,10,0.5) 100%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 12%, rgba(74,33,112,0.4) 100%, transparent 100%),
    radial-gradient(1px 1px at 55% 68%, rgba(150,105,10,0.4) 100%, transparent 100%),
    radial-gradient(1.5px 1.5px at 28% 82%, rgba(31,107,59,0.35) 100%, transparent 100%),
    radial-gradient(1px 1px at 90% 58%, rgba(74,33,112,0.35) 100%, transparent 100%);
}

/* ---- floating magical decorations (wands + sparkles) ---- */
.magic-decor{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
.magic-decor svg{position:absolute; stroke:currentColor;}
.magic-wand{color:var(--gold); opacity:.22;}
.magic-sparkle{color:var(--violet); opacity:.20;}
.magic-1{top:8%; left:6%; width:52px; height:52px; animation:magicFloat 8s ease-in-out infinite, magicSpin 22s linear infinite;}
.magic-2{top:14%; right:9%; width:32px; height:32px; animation:magicTwinkle 3.2s ease-in-out infinite;}
.magic-3{bottom:30%; left:9%; width:26px; height:26px; animation:magicTwinkle 4s ease-in-out infinite .6s;}
.magic-4{bottom:10%; right:7%; width:58px; height:58px; transform:rotate(200deg); animation:magicFloat 9.5s ease-in-out infinite reverse, magicSpin 26s linear infinite reverse;}
.magic-5{top:46%; left:2.5%; width:22px; height:22px; animation:magicTwinkle 3.6s ease-in-out infinite 1.1s;}
.magic-6{top:65%; right:16%; width:24px; height:24px; animation:magicTwinkle 4.4s ease-in-out infinite .3s;}
.magic-7{top:36%; right:2%; width:38px; height:38px; transform:rotate(60deg); animation:magicFloat 7s ease-in-out infinite 1.5s;}
@keyframes magicFloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg));} 50%{transform:translateY(-18px) rotate(var(--r,0deg));}}
@keyframes magicTwinkle{0%,100%{opacity:.06;} 50%{opacity:.34;}}
@keyframes magicSpin{to{transform:rotate(360deg);}}
@media (max-width:980px){ .magic-decor{display:none;} }
h1,h2,h3,.font-display{font-family:'Cinzel',serif; letter-spacing:.01em;}
.font-mono{font-family:'JetBrains Mono',monospace;}
::selection{background:var(--emerald); color:#F5EFD8;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--glass-border); border-radius:10px;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ============================= LAYOUT ============================= */
#app{display:none;}
#app.ready{display:flex; min-height:100vh; position:relative; z-index:2;}
#auth-screen, #onboarding-screen{position:relative; z-index:2;}

.sidebar{
  width:250px; flex-shrink:0; position:fixed; top:0; left:0; bottom:0; z-index:40;
  background:var(--bg-elev); border-right:1px solid var(--glass-border);
  display:flex; flex-direction:column; padding:22px 16px; transition:transform .3s ease, background .35s ease;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:6px 10px 26px 10px;}
.sidebar-brand .mark{
  width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--emerald), var(--violet)); flex-shrink:0;
}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:12px; margin-bottom:2px;
  color:var(--text-dim); font-size:14px; font-weight:500; border:none; background:transparent; width:100%; text-align:left;
  transition:background .15s ease, color .15s ease;
}
.nav-item:hover{background:var(--glass-strong); color:var(--text);}
.nav-item.active{background:var(--emerald-soft); color:var(--emerald);}
.nav-item svg{width:18px; height:18px; flex-shrink:0;}
.nav-section-label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint); padding:16px 12px 6px;}

.main-col{margin-left:250px; flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:14px; padding:14px 26px;
  background:color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--glass-border);
}
.content{padding:26px; max-width:1400px; width:100%; margin:0 auto;}
.view{display:none;}
.view.active{display:block; animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ============================= GLASS / CARDS ============================= */
.glass{
  background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius);
  backdrop-filter:blur(18px); box-shadow:var(--ring-shadow);
}
.glass-tight{background:var(--glass); border:1px solid var(--glass-border); border-radius:14px;}
.stat-card{position:relative; overflow:hidden; padding:20px 22px;}
.stat-card .icon-badge{
  width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.hero-balance{
  position:relative; overflow:hidden; padding:30px 30px 26px;
  background:linear-gradient(155deg, var(--bg-elev-2), var(--bg-elev));
  border:1px solid var(--glass-border); border-radius:22px; box-shadow:var(--ring-shadow);
}
.hero-balance::before{
  content:''; position:absolute; inset:-2px; border-radius:22px; padding:2px;
  background:conic-gradient(from var(--ang,0deg), var(--emerald), var(--violet), var(--gold), var(--emerald));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude; opacity:.55; animation:spin 8s linear infinite;
}
@keyframes spin{to{--ang:360deg;}}
@property --ang{syntax:'<angle>'; inherits:false; initial-value:0deg;}

/* ============================= BUTTONS ============================= */
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:11px; font-size:13.5px; font-weight:600;
  border:1px solid transparent; transition:transform .12s ease, filter .15s ease, background .15s ease; white-space:nowrap;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--emerald); color:#F5EFD8;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--glass-strong); color:var(--text); border-color:var(--glass-border);}
.btn-ghost:hover{background:var(--glass-border);}
.btn-danger{background:var(--coral-soft); color:var(--coral);}
.btn-danger:hover{filter:brightness(1.1);}
.btn-icon{width:38px; height:38px; padding:0; justify-content:center; border-radius:11px; background:var(--glass-strong); border:1px solid var(--glass-border); color:var(--text-dim);}
.btn-icon:hover{color:var(--text); background:var(--glass-border);}

/* ============================= FORMS ============================= */
.field-label{font-size:12.5px; font-weight:600; color:var(--text-dim); margin-bottom:6px; display:block;}
.input, select.input, textarea.input{
  width:100%; padding:10px 12px; border-radius:11px; background:var(--bg); border:1px solid var(--glass-border);
  color:var(--text); font-size:13.5px; outline:none; transition:border-color .15s ease;
}
.input:focus{border-color:var(--emerald);}
html.light .input{background:#F7F8FB;}

/* ============================= TABLE ============================= */
table.data-table{width:100%; border-collapse:collapse; font-size:13.5px;}
table.data-table th{
  text-align:left; padding:10px 14px; color:var(--text-faint); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em;
  border-bottom:1px solid var(--glass-border); font-weight:600;
}
table.data-table td{padding:12px 14px; border-bottom:1px solid var(--glass-border); vertical-align:middle;}
table.data-table tbody tr{transition:background .12s ease;}
table.data-table tbody tr:hover{background:var(--glass-strong);}

.pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:100px; font-size:11.5px; font-weight:600;}

/* ============================= PROGRESS ============================= */
.progress-track{width:100%; height:9px; border-radius:100px; background:var(--glass-border); overflow:hidden;}
.progress-fill{height:100%; border-radius:100px; transition:width .5s cubic-bezier(.22,1,.36,1);}
